# Build + publish vigil-agent releases across Windows + Linux.
#
# Triggers:
#   - On push of a v* tag → builds everything, attaches MSI to GitHub Release,
#     and (if Hub secrets are set) signs + uploads the bare .exe and ELF
#     binaries to the Hub's exe-update channel.
#   - Manual via workflow_dispatch → builds and uploads artifacts only.
#
# Artifacts produced per tag:
#   - vigil-agent-<version>-x86_64.msi          (Windows installer, GH Release)
#   - vigil-agent-windows-amd64-<version>.exe   (bare binary, GH Release + Hub)
#   - vigil-agent-linux-amd64-<version>         (bare binary, GH Release + Hub)
#
# Required secrets for full publish:
#   VIGIL_UPDATE_PUBKEY        64-hex ed25519 public key — baked into all
#                              agent builds at compile time so installed
#                              agents can verify signed auto-updates.
#   VIGIL_UPDATE_SIGNING_KEY   PKCS8 PEM private key (full file contents) used
#                              to sign each bare binary post-build.
#   VIGIL_HUB_URL              e.g. https://vigil.san-marcos.net — target Hub
#                              for the auto-upload step.
#   VIGIL_HUB_API_TOKEN        Admin-scoped personal API token (`vgl_…`) used
#                              to POST signed releases to the Hub.
#
# Code-signing on the MSI itself is still a separate concern (Authenticode,
# requires a real cert). See docs/INSTALLER.md.
name: release-msi

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed to attach artifacts to GitHub Release

jobs:
  # ─── Linux bare binary ──────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VIGIL_UPDATE_PUBKEY: ${{ secrets.VIGIL_UPDATE_PUBKEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-release
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache target/
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}-release
          restore-keys: ${{ runner.os }}-target-

      - name: Build vigil-agent (release, with pubkey baked in)
        run: cargo build --release -p vigil-agent

      - name: Confirm pubkey baked in
        run: |
          if [ -n "$VIGIL_UPDATE_PUBKEY" ]; then
            ./target/release/vigil-agent version | tee /dev/stderr | grep -q "$(echo $VIGIL_UPDATE_PUBKEY | head -c 8)" || {
              echo "::error::built binary does not contain expected pubkey fingerprint"
              exit 1
            }
          else
            echo "::warning::VIGIL_UPDATE_PUBKEY not set — agents won't verify update signatures"
          fi

      - name: Stage artifact with versioned name
        run: |
          VER=$(grep '^version' vigil-agent/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          mkdir -p dist
          cp target/release/vigil-agent "dist/vigil-agent-linux-amd64-${VER}"
          ls -l dist/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: vigil-agent-linux-amd64
          path: dist/vigil-agent-linux-amd64-*
          if-no-files-found: error
          retention-days: 30

  # ─── Windows bare binary + tray + MSI ───────────────────────────────────
  build-msi:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      VIGIL_UPDATE_PUBKEY: ${{ secrets.VIGIL_UPDATE_PUBKEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-wix.exe
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-wix
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache target/
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}-msi
          restore-keys: ${{ runner.os }}-target-

      - name: Ensure WiX Toolset 3.14
        run: |
          $wixBin = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (Test-Path "$wixBin\candle.exe") {
            Write-Host "✓ WiX 3.14 already installed at $wixBin"
          } else {
            Write-Host "WiX not present — installing via chocolatey"
            choco install wixtoolset --version=3.14.1 -y --no-progress
          }
          echo "$wixBin" >> $env:GITHUB_PATH

      - name: Install cargo-wix
        run: |
          if (-not (Test-Path "$env:USERPROFILE\.cargo\bin\cargo-wix.exe")) {
            cargo install cargo-wix --locked --version "^0.3"
          } else {
            Write-Host "cargo-wix already cached"
          }

      - name: Build vigil-agent (release, with pubkey baked in)
        run: cargo build --release --target x86_64-pc-windows-msvc -p vigil-agent

      - name: Build vigil-tray (release, windows-all)
        run: cargo build --release --target x86_64-pc-windows-msvc -p vigil-tray --features windows-all

      - name: Build MSI
        working-directory: vigil-agent
        run: |
          cargo wix `
            --no-build `
            --nocapture `
            --package vigil-agent `
            --target x86_64-pc-windows-msvc `
            -o ../target/wix

      - name: Stage bare .exe with versioned name
        shell: pwsh
        run: |
          $ver = (Select-String -Path vigil-agent/Cargo.toml -Pattern '^version' | Select-Object -First 1).Line -replace '.*"(.*)".*','$1'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\x86_64-pc-windows-msvc\release\vigil-agent.exe "dist\vigil-agent-windows-amd64-$ver.exe"
          Get-ChildItem dist

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: vigil-agent-msi
          path: target/wix/*.msi
          if-no-files-found: error
          retention-days: 30

      - name: Upload bare Windows .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: vigil-agent-windows-amd64
          path: dist/vigil-agent-windows-amd64-*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Attach MSI + bare .exe to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/wix/*.msi
            dist/vigil-agent-windows-amd64-*.exe
          fail_on_unmatched_files: true

  # ─── MSI install/uninstall smoke (unchanged from before) ────────────────
  smoke-install:
    needs: build-msi
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vigil-agent-msi
          path: msi

      - name: Locate MSI
        id: locate
        shell: pwsh
        run: |
          $msi = Get-ChildItem msi -Filter *.msi | Select-Object -First 1
          if (-not $msi) { throw "no MSI in artifact" }
          "msi_path=$($msi.FullName)" >> $env:GITHUB_OUTPUT

      - name: Install MSI silently (no enrollment)
        shell: pwsh
        run: |
          $log = "install.log"
          $p = Start-Process msiexec.exe -ArgumentList "/i","${{ steps.locate.outputs.msi_path }}","/qn","/l*v",$log -Wait -PassThru
          if ($p.ExitCode -ne 0) { Get-Content $log -Tail 80; exit $p.ExitCode }

      - name: Assert install layout
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\Program Files\Vigil\vigil-agent.exe")) { throw "missing vigil-agent.exe" }
          if (-not (Test-Path "C:\Program Files\Vigil\vigil-tray.exe"))  { throw "missing vigil-tray.exe" }

      - name: Run vigil-agent --version (and confirm pubkey baked in)
        shell: pwsh
        run: |
          $out = & "C:\Program Files\Vigil\vigil-agent.exe" --version 2>&1 | Out-String
          Write-Host $out
          if ($LASTEXITCODE -ne 0) { throw "version exited $LASTEXITCODE" }
          if ("${{ secrets.VIGIL_UPDATE_PUBKEY }}" -ne "") {
            $fp = "${{ secrets.VIGIL_UPDATE_PUBKEY }}".Substring(0,8)
            if ($out -notmatch [regex]::Escape($fp)) {
              throw "binary missing expected pubkey fingerprint $fp"
            }
            Write-Host "✓ pubkey fingerprint $fp present"
          }

      - name: Uninstall MSI silently
        shell: pwsh
        run: |
          $log = "uninstall.log"
          $p = Start-Process msiexec.exe -ArgumentList "/x","${{ steps.locate.outputs.msi_path }}","/qn","/l*v",$log -Wait -PassThru
          if ($p.ExitCode -ne 0) { Get-Content $log -Tail 80; exit $p.ExitCode }

      - name: Assert cleanup
        shell: pwsh
        run: |
          if (Test-Path "C:\Program Files\Vigil\vigil-agent.exe") { throw "vigil-agent.exe still present" }
          $svc = Get-Service VIGILAgent -ErrorAction SilentlyContinue
          if ($svc) { throw "VIGILAgent service still registered" }

      - name: Upload install/uninstall logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: msi-logs
          path: |
            install.log
            uninstall.log
          if-no-files-found: ignore

  # ─── Sign bare binaries + publish to Hub auto-update channel ────────────
  # Runs only on tag pushes when all four publish secrets are configured.
  # Missing any of them → step exits cleanly with a notice, no failure.
  publish-to-hub:
    needs: [build-linux, build-msi]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VIGIL_HUB_URL:           ${{ secrets.VIGIL_HUB_URL }}
      VIGIL_HUB_API_TOKEN:     ${{ secrets.VIGIL_HUB_API_TOKEN }}
      VIGIL_UPDATE_SIGNING_KEY: ${{ secrets.VIGIL_UPDATE_SIGNING_KEY }}
      VIGIL_UPDATE_PUBKEY:     ${{ secrets.VIGIL_UPDATE_PUBKEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Check publish secrets are configured
        id: gate
        run: |
          if [ -z "$VIGIL_HUB_URL" ] || [ -z "$VIGIL_HUB_API_TOKEN" ] || [ -z "$VIGIL_UPDATE_SIGNING_KEY" ] || [ -z "$VIGIL_UPDATE_PUBKEY" ]; then
            echo "::notice::Hub publish secrets missing — skipping. Set VIGIL_HUB_URL, VIGIL_HUB_API_TOKEN, VIGIL_UPDATE_SIGNING_KEY, VIGIL_UPDATE_PUBKEY in repo secrets to enable."
            echo "skip=1" >> $GITHUB_OUTPUT
          fi

      - name: Stage signing key
        if: steps.gate.outputs.skip != '1'
        run: |
          mkdir -p ~/.config/vigil
          umask 077
          printf '%s\n' "$VIGIL_UPDATE_SIGNING_KEY" > ~/.config/vigil/update-signing-key.pem
          printf '%s\n' "$VIGIL_UPDATE_PUBKEY"      > ~/.config/vigil/update-pubkey.hex
          chmod 600 ~/.config/vigil/update-signing-key.pem ~/.config/vigil/update-pubkey.hex

      - uses: actions/download-artifact@v4
        if: steps.gate.outputs.skip != '1'
        with:
          name: vigil-agent-linux-amd64
          path: dist/

      - uses: actions/download-artifact@v4
        if: steps.gate.outputs.skip != '1'
        with:
          name: vigil-agent-windows-amd64
          path: dist/

      - name: Sign + upload + activate each release
        if: steps.gate.outputs.skip != '1'
        run: |
          set -euo pipefail
          VER=$(grep '^version' vigil-agent/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')

          for entry in "linux:vigil-agent-linux-amd64-${VER}" "windows:vigil-agent-windows-amd64-${VER}.exe"; do
            OS="${entry%%:*}"
            FILE="dist/${entry#*:}"
            test -f "$FILE" || { echo "::error::missing $FILE"; exit 1; }

            echo "::group::sign $OS"
            META=$(bash scripts/sign-release.sh "$FILE")
            echo "$META"
            SIG=$(echo "$META" | jq -r .signature)
            SIGNED_BY=$(echo "$META" | jq -r .signedBy)
            SHA=$(echo "$META" | jq -r .sha256)
            echo "::endgroup::"

            echo "::group::upload $OS"
            RESP=$(curl -sS -X POST "${VIGIL_HUB_URL%/}/api/admin/agent-releases/upload" \
              -H "Authorization: Bearer $VIGIL_HUB_API_TOKEN" \
              -F "os=$OS" -F "arch=amd64" -F "version=$VER" -F "artifactType=exe-update" \
              -F "signature=$SIG" -F "signedBy=$SIGNED_BY" -F "expectedSha256=$SHA" \
              -F "file=@$FILE")
            echo "$RESP" | jq -c '{id, os, arch, version, signedBy, error}' || echo "$RESP"
            ID=$(echo "$RESP" | jq -r '.id // empty')
            if [ -z "$ID" ]; then
              echo "::error::upload returned no id (response above)"; exit 1
            fi
            echo "::endgroup::"

            echo "::group::activate $OS"
            curl -sS -X PATCH "${VIGIL_HUB_URL%/}/api/admin/agent-releases/$ID" \
              -H "Authorization: Bearer $VIGIL_HUB_API_TOKEN" -H "Content-Type: application/json" \
              -d '{"isActive":true}' -w "  HTTP=%{http_code}\n" -o /dev/null
            echo "::endgroup::"
          done
