services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vigil}
      POSTGRES_USER: ${POSTGRES_USER:-vigil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      default:
        ipv4_address: 192.168.255.2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vigil}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot ownership fix for the named volumes. Docker named volumes are
  # root-owned on first creation, which conflicts with vigil-hub's USER
  # nextjs (uid 1001) — writes fail with EACCES. Runs as uid 0, chowns the
  # mount points to 1001:1001, exits. Re-runs harmlessly on every deploy.
  vigil-volume-init:
    image: alpine:3
    user: "0:0"
    command: ["sh", "-c", "chown -R 1001:1001 /app/binaries /app/public/uploads"]
    volumes:
      - uploads:/app/public/uploads
      - binaries:/app/binaries
    restart: "no"

  # One-shot migration sidecar. Uses the Dockerfile's `builder` stage so it
  # has the full prisma CLI dependency graph (including hoisted transitives
  # the runner stage doesn't carry). Applies the schema via `prisma db push`,
  # exits 0 on success. vigil-hub depends on this completing successfully.
  vigil-migrate:
    build:
      context: .
      dockerfile: vigil-hub/Dockerfile
      target: builder
    command: ["sh", "-c", "cd vigil-hub && ./node_modules/.bin/prisma db push --skip-generate"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vigil}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vigil}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  vigil-hub:
    build:
      # Workspace root context — vigil-hub is an npm workspace member,
      # so the Dockerfile needs the root package-lock.json to resolve deps.
      context: .
      dockerfile: vigil-hub/Dockerfile
    ports:
      # Host port is parameterised so the stack can sit behind a reverse-proxy
      # / coexist with other apps on the same Docker host. Override via the
      # HUB_HOST_PORT env var on the stack (Portainer: Stack → Env).
      - "${HUB_HOST_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vigil}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vigil}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required (64 hex chars)}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID:-}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET:-}
      AZURE_AD_TENANT_ID: ${AZURE_AD_TENANT_ID:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-vigil@localhost}
      TWILIO_SID: ${TWILIO_SID:-}
      TWILIO_TOKEN: ${TWILIO_TOKEN:-}
      TWILIO_FROM: ${TWILIO_FROM:-}
      AGENT_BINARIES_PATH: /app/binaries
      # Allow the Hub to call RFC1918 / loopback hosts (SMTP relays inside the
      # corp net, cert monitors against internal CAs, webhooks to private LB
      # IPs, etc.). Disabled by default — set on the stack when the Hub is
      # intentionally deployed in private space. Loosens SSRF defence.
      VIGIL_ALLOW_INTERNAL_NET: ${VIGIL_ALLOW_INTERNAL_NET:-0}
      # 64-hex ed25519 public key the operator signs releases with. Required
      # by the rollout flow — without it the Admin → Agent Releases page
      # shows "No signing key configured" and unsigned uploads can't be
      # promoted. Generate via the snippet in README "Quick start" step 3;
      # set on the stack (Portainer: Stack → Env), not in the repo.
      VIGIL_UPDATE_PUBKEY: ${VIGIL_UPDATE_PUBKEY:-}
    volumes:
      - uploads:/app/public/uploads
      - binaries:/app/binaries
    depends_on:
      postgres:
        condition: service_healthy
      vigil-migrate:
        condition: service_completed_successfully
      vigil-volume-init:
        condition: service_completed_successfully
    networks:
      default:
        ipv4_address: 192.168.255.3
    healthcheck:
      # 127.0.0.1, not localhost — Node listens on 0.0.0.0 (IPv4) but Alpine
      # resolves localhost to ::1 first; wget fails ECONNREFUSED on the v6
      # attempt and never falls back. This block overrides the Dockerfile's
      # HEALTHCHECK, so fixing it there alone wouldn't take effect.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
  uploads:
  binaries:

networks:
  # Override compose's default bridge so we can pin static IPs per service.
  # postgres → 192.168.255.2, vigil-hub → 192.168.255.3.
  # 192.168.255.0/24 was unused on this Docker host at deploy time; pick a
  # different /24 if it collides on another host.
  default:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.255.0/24
          gateway: 192.168.255.1
